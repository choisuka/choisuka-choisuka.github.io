<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>행복한 하루</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --warm: #f59e0b;
    --rose: #e11d48;
    --teal: #0d9488;
    --card: rgba(255,255,255,.88);
    --radius: 18px;
  }

  /* ── Weather Themes ── */
  body.clear        { --A:#fef3c7; --B:#fed7aa; --P:#d97706; --T:#78350f; }
  body.partlyCloudy { --A:#dbeafe; --B:#e0f2fe; --P:#0284c7; --T:#0c4a6e; }
  body.cloudy       { --A:#e2e8f0; --B:#cbd5e1; --P:#475569; --T:#1e293b; }
  body.foggy        { --A:#d1fae5; --B:#ecfdf5; --P:#059669; --T:#064e3b; }
  body.drizzle      { --A:#dbeafe; --B:#c7d2fe; --P:#4f46e5; --T:#1e3a8a; }
  body.rainy        { --A:#c7d2fe; --B:#a5b4fc; --P:#4338ca; --T:#312e81; }
  body.snowy        { --A:#e0f2fe; --B:#f0f9ff; --P:#0369a1; --T:#0c4a6e; }
  body.thunderstorm { --A:#1e1b4b; --B:#312e81; --P:#a5b4fc; --T:#e0e7ff; --card:rgba(15,10,60,.75); }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--A,#fef3c7) 0%, var(--B,#fed7aa) 100%);
    color: var(--T, #78350f);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    transition: background 1.4s ease, color .6s;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  .site-header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }
  .site-logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -.02em;
    color: var(--P, #d97706);
    margin-bottom: .2rem;
  }
  .site-sub {
    font-size: .85rem;
    opacity: .65;
    margin-bottom: 1rem;
  }
  .date-box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    background: var(--card);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: .6rem 1.4rem;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .date-box .greeting { font-size: .8rem; opacity: .6; }
  .date-box .date     { font-size: 1rem; font-weight: 700; color: var(--P); }
  .date-box .clock    { font-size: .85rem; opacity: .55; }

  /* ── LOCATION BAR ── */
  .loc-bar {
    display: flex;
    justify-content: center;
    gap: .5rem;
    padding: .6rem 1rem;
    flex-wrap: wrap;
  }
  .loc-bar input {
    padding: .45rem .9rem;
    border: 1.5px solid var(--P, #d97706);
    border-radius: 8px;
    font-size: .88rem;
    background: var(--card);
    color: var(--T);
    width: 175px;
  }
  .loc-btn {
    padding: .45rem .9rem;
    background: var(--P, #d97706);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: .88rem;
    font-weight: 600;
    transition: opacity .2s;
  }
  .loc-btn:hover { opacity: .85; }

  /* ── MAIN ── */
  main { max-width: 700px; margin: 0 auto; padding: .5rem 1rem 4rem; }

  #loading { text-align: center; padding: 2.5rem; font-size: 1rem; color: var(--P); }
  #err-box  { text-align: center; padding: 1.5rem; }
  .err-btn  { margin-top: .6rem; padding: .4rem .9rem; background: var(--rose); color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  /* ── WEATHER BANNER ── */
  .w-banner {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 24px rgba(0,0,0,.1);
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }
  .w-big   { font-size: 3.8rem; flex-shrink: 0; }
  .w-loc   { font-size: .82rem; opacity: .6; margin-bottom: .15rem; }
  .w-temp  { font-size: 1.9rem; font-weight: 800; }
  .w-cond  { font-size: .95rem; font-weight: 600; }
  .w-meta  { display: flex; gap: .8rem; font-size: .8rem; margin-top: .35rem; opacity: .6; }

  /* ── QUOTE BOX ── */
  .quote-box {
    background: var(--P, #d97706);
    color: #fff;
    border-radius: var(--radius);
    padding: 1rem 1.3rem;
    margin-bottom: 1rem;
    font-size: .95rem;
    font-style: italic;
    font-weight: 500;
    box-shadow: 0 4px 18px rgba(0,0,0,.12);
    position: relative;
    overflow: hidden;
  }
  .quote-box::before { content: '\201C'; font-size: 5rem; position: absolute; top: -1.2rem; left: .3rem; opacity: .2; font-family: Georgia, serif; }
  .quote-box .q-text { position: relative; }
  .quote-box .q-src  { display: block; font-style: normal; font-size: .78rem; opacity: .75; margin-top: .3rem; }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    gap: .4rem;
    overflow-x: auto;
    padding-bottom: .3rem;
    margin-bottom: 1rem;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: .5rem 1rem;
    border: 1.5px solid var(--P, #d97706);
    border-radius: 999px;
    background: transparent;
    color: var(--P);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn.active,
  .tab-btn:hover { background: var(--P); color: #fff; }

  /* ── CONTENT PANELS ── */
  .panel { display: block; max-height: 0; overflow: hidden; opacity: 0; pointer-events: none; }
  .panel.active { max-height: 9999px; opacity: 1; pointer-events: auto; }

  .content-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    padding: 1.3rem;
    box-shadow: 0 3px 18px rgba(0,0,0,.08);
  }

  /* Music */
  .music-artist { font-size: .78rem; opacity: .6; margin-bottom: .2rem; }
  .music-title  { font-size: 1rem; font-weight: 700; margin-bottom: .3rem; }
  .music-why    { font-size: .85rem; opacity: .7; margin-bottom: .8rem; padding: .5rem; background: rgba(0,0,0,.04); border-radius: 8px; border-left: 3px solid var(--P); }
  /* YouTube 썸네일 클릭 재생 */
  .yt-cover { display: block; position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; cursor: pointer; background: #000; margin-bottom: .4rem; text-decoration: none; }
  .yt-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity .2s; }
  .yt-cover:hover img { opacity: .85; }
  .yt-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 62px; height: 62px; background: rgba(220,0,0,.88); border-radius: 50%; pointer-events: none; transition: transform .18s, background .18s; }
  .yt-cover:hover .yt-play-btn { transform: translate(-50%,-50%) scale(1.1); background: #f00; }
  .yt-play-btn::after { content: ''; position: absolute; top: 50%; left: 54%; transform: translate(-50%,-50%); border: 10px solid transparent; border-left: 18px solid #fff; }
  .yt-open-link { display: inline-block; margin-top: .5rem; font-size: .82rem; color: var(--P); text-decoration: none; opacity: .75; }
  .yt-open-link:hover { opacity: 1; text-decoration: underline; }

  /* Poem */
  .poem-author { font-size: .82rem; opacity: .6; margin-bottom: .6rem; }
  .poem-body {
    white-space: pre-line;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', serif;
    font-size: .95rem;
    line-height: 2.1;
    padding: .9rem 1rem;
    background: rgba(0,0,0,.04);
    border-radius: 10px;
    border-left: 4px solid var(--P, #d97706);
  }

  /* Art */
  .art-img   { width: 100%; border-radius: 12px; margin-bottom: .7rem; display: block; }
  .art-title { font-weight: 700; font-size: .98rem; }
  .art-info  { font-size: .8rem; opacity: .6; margin-top: .1rem; }
  .art-desc  { font-size: .87rem; margin-top: .45rem; line-height: 1.6; }

  /* Places */
  .place-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .7rem; }
  .place-item { background: rgba(0,0,0,.05); border-radius: 12px; padding: .8rem; }
  .place-icon { font-size: 1.5rem; margin-bottom: .25rem; }
  .place-name { font-weight: 700; font-size: .9rem; }
  .place-desc { font-size: .78rem; opacity: .65; margin-top: .2rem; }

  /* Books */
  .book-item { border-bottom: 1px solid rgba(0,0,0,.07); padding: .75rem 0; }
  .book-item:last-child { border-bottom: none; }
  .book-title  { font-weight: 700; font-size: .95rem; }
  .book-author { font-size: .78rem; opacity: .6; }
  .book-reason { font-size: .85rem; margin-top: .2rem; }

  /* Activities */
  .job-sel {
    width: 100%; padding: .5rem; border: 1.5px solid var(--P);
    border-radius: 8px; background: var(--card); color: var(--T);
    font-size: .9rem; margin-bottom: .8rem; cursor: pointer;
  }
  .act-list { list-style: none; }
  .act-list li {
    padding: .55rem .5rem; border-bottom: 1px solid rgba(0,0,0,.06);
    font-size: .9rem; display: flex; gap: .5rem; align-items: flex-start;
  }
  .act-list li::before { content: '🌟'; flex-shrink: 0; }
  .act-list li:last-child { border-bottom: none; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: .78rem;
    opacity: .45;
  }
</style>
<script src="../toro_ai.js"></script>
</head>

</main>

<footer>행복한 하루 · 날씨 제공: Open-Meteo · 명화: Wikimedia Commons</footer>

<script>
// ══════════════════════════════════════════
//  DAILY PICK — 오늘 날짜 기준으로 배열에서 하나 선택
// ══════════════════════════════════════════
function pick(arr){
  const d = new Date();
  const day = Math.floor((d - new Date(d.getFullYear(), 0, 1)) / 86400000);
  return arr[day % arr.length];
}

      {title:'가지 않은 길', author:'로버트 프로스트 · 1916', text:`노란 숲속에 두 갈래 길이 있었고,\n나는 두 길을 모두 갈 수 없었다.\n오랫동안 서서 한 길 끝까지 바라보았다,\n굽어 사라질 때까지.\n\n나는 다른 길을 택했다.\n\n언젠가 어딘가에서 나는 한숨짓겠지 —\n두 갈래 길이 숲속에 있었고,\n나는 사람이 덜 걸은 길을 택했노라고,\n그리고 그것이 모든 차이를 만들었노라고.`},
      {title:'청포도', author:'이육사 · 1939', text:`내 고장 칠월은\n청포도가 익어가는 시절.\n\n이 마을 전설이 주저리주저리 열리고\n먼 데 하늘이 꿈꾸며 알알이 들어와 박혀,\n\n하늘 밑 푸른 바다가 가슴을 열고\n흰 돛단배가 곱게 밀려서 오면,\n\n내가 바라는 손님은 고달픈 몸으로\n청포(靑袍)를 입고 찾아온다고 했으니,\n\n내 그를 맞아, 이 포도를 따 먹으면\n두 손은 함뿍 적셔도 좋으련.\n\n아이야, 우리 식탁엔 은쟁반에\n하얀 모시 수건을 마련해 두렴.`},
      {title:'오늘 밤 나는 쓸 수 있다 (부분)', author:'파블로 네루다 · 1924', text:`오늘 밤 나는 쓸 수 있다,\n가장 슬픈 시들을.\n\n나는 그녀를 사랑했고,\n때때로 그녀도 나를 사랑했다.\n\n그런 밤들에, 내 팔 안에 그녀를 안았었다.\n하늘이 밝고, 별이 파랗게 떨며 흔들렸다.\n\n그녀는 나를 사랑했고, 때때로 나도 그녀를 사랑했다.\n눈에 보이지 않는 것들은 얼마나 잊지 못하는지.`}

    poems:[
      {title:'서시', author:'윤동주 · 1941', text:`죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를,\n잎새에 이는 바람에도\n나는 괴로워했다.\n\n별을 노래하는 마음으로\n모든 죽어가는 것을 사랑해야지\n그리고 나한테 주어진 길을\n걸어가야겠다.\n\n오늘 밤에도 별이 바람에 스치운다.`},
      {title:'가을날', author:'라이너 마리아 릴케 · 1902', text:`주여, 때가 되었습니다.\n여름은 참으로 길었습니다.\n해시계 위에 그늘을 드리우시고,\n들판에 바람을 풀어놓으소서.\n\n지금 집 없는 자는 집을 짓지 않을 것입니다.\n지금 홀로인 자는 오래도록 홀로일 것입니다.\n잠 못 들고, 읽고, 긴 편지를 쓸 것입니다.\n그리고 낙엽 흩날리는 날,\n이리저리 가로수 길을 불안하게 떠돌 것입니다.`},
      {title:'님의 침묵 (부분)', author:'한용운 · 1926', text:`님은 갔습니다. 아아, 사랑하는 나의 님은 갔습니다.\n푸른 산빛을 깨치고 단풍나무 숲을 향하여\n난 작은 길을 걸어서, 차마 떨치고 갔습니다.\n\n우리는 만날 때에 떠날 것을 염려하는 것과 같이,\n떠날 때에 다시 만날 것을 믿습니다.\n\n아아, 님은 갔지마는 나는 님을 보내지 아니하였습니다.\n제 곡조를 못 이기는 사랑의 노래는\n님의 침묵을 휩싸고 돕니다.`},
      {title:'우울 (부분)', author:'샤를 보들레르 · 1857', text:`하늘은 뚜껑처럼 무겁게 내리눌러\n권태로 신음하는 영혼에 씌운다.\n지평선을 에워싸며 회색빛을 쏟아낼 때,\n슬픈 낮은 슬픈 밤보다 더 어둡다.\n\n희망이 날개 꺾인 박쥐처럼\n썩은 천장에 부딪히며 맴돌다 떨어진다.\n빗소리는 창살처럼 내 머릿속을 두드린다.`},
      {title:'별 헤는 밤 (부분)', author:'윤동주 · 1941', text:`계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴속에 하나 둘 새겨지는 별을\n이제 다 못 헤는 것은\n쉬이 아침이 오는 까닭이요,\n내일 밤이 남은 까닭이요,\n아직 나의 청춘이 다하지 않은 까닭입니다.\n\n별 하나에 추억과\n별 하나에 사랑과\n별 하나에 쓸쓸함과\n별 하나에 동경과\n별 하나에 시와\n별 하나에 어머니, 어머니.`},
      {title:'프루프록의 사랑 노래 (부분)', author:'T.S. 엘리엇 · 1915', text:`그럼 가자, 당신과 나,\n저녁이 하늘을 배경으로 펼쳐질 때 —\n수술대 위에 마취된 환자처럼.\n\n나는 커피 스푼으로 내 삶을 재어왔다.\n오, 감히 복숭아 하나를 먹어도 될까.\n흰 바지를 입고 해변을 걸어도 될까.\n나는 인어들이 서로 노래하는 것을 들었다.\n그녀들이 나를 위해 노래하리라고는 생각하지 않는다.`}

      {title:'유리창 1', author:'정지용 · 1930', text:`유리(琉璃)에 차고 슬픈 것이 어른거린다.\n열없이 붙어서서 입김을 흐리우니\n길들은 양 언 날개를 파다거린다.\n지우고 보고 지우고 보아도\n새까만 밤이 밀려나가고 밀려와 부디치고,\n물 먹은 별이, 반짝, 보석처럼 박힌다.\n뒤척이며 죽어 울었다가\n창 밖에 밤비가 속살거려.`},
      {title:'안개', author:'칼 샌드버그 · 1916', text:`안개는 고양이 발로 온다.\n\n조용히 항구와 도시 위에 걸터앉아\n작은 발굽 위에서 바라보다가\n그리고 떠난다.`},
      {title:'모란이 피기까지는', author:'김영랑 · 1934', text:`모란이 피기까지는\n나는 아직 나의 봄을 기다리고 있을 테요.\n모란이 뚝뚝 떨어져 버린 날,\n나는 비로소 봄을 여읜 설움에 잠길 테요.\n\n오월 어느 날, 그 하루 무덥던 날,\n떨어져 누운 꽃잎마저 시들어 버리고는\n천지에 모란은 자취도 없어지고,\n뻗쳐 오르던 내 보람 서운케 무너졌느니,\n모란이 지고 말면 그뿐, 내 한 해는 다 가고 말아,\n삼백예순 날 하냥 섭섭해 우옵내다.\n\n모란이 피기까지는\n나는 아직 기다리고 있을 테요, 찬란한 슬픔의 봄을.`},
      {title:'하이쿠 세 편', author:'마츠오 바쇼 · 1686', text:`고요함이여 —\n매미 소리가 바위 속으로\n스며드는구나.\n\n오래된 연못에\n개구리 뛰어드는 소리 —\n물 튀는 소리.\n\n이슬 속에\n세상의 먼지를 씻어내며\n시원한 아침.`},
      {title:'절정', author:'이육사 · 1940', text:`매운 계절(季節)의 채찍에 갈겨\n마침내 북방(北方)으로 휩쓸려 오다.\n\n하늘도 그만 지쳐 끝난 고원(高原)\n서릿발 칼날진 그 위에 서다.\n\n어디다 무릎을 꿇어야 하나\n한 발 재겨 디딜 곳조차 없다.\n\n이러매 눈 감아 생각해 볼밖에\n겨울은 강철로 된 무지갠가 보다.`},
      {title:'점점 넓어지는 원', author:'라이너 마리아 릴케 · 1899', text:`나는 내 삶을 점점 넓어지는 원 속에서 산다,\n오래된 것들 위로 넘실거리며.\n어쩌면 마지막 원은 완성되지 않을지도,\n그러나 나는 그것을 시도하겠다.\n\n나는 신 주위를 돈다, 태고의 탑 주위를,\n수천 년 동안 돌고 있다.\n나는 아직 모른다 — 매인가, 폭풍인가,\n아니면 위대한 노래인가.`}

    poems:[
      {title:'빼앗긴 들에도 봄은 오는가 (부분)', author:'이상화 · 1926', text:`지금은 남의 땅 — 빼앗긴 들에도 봄은 오는가?\n\n나는 온몸에 풋내를 띠고,\n푸른 웃음 푸른 설움이 어우러진 사이로\n다리를 절며 하루를 걷는다.\n아마도 봄 신명이 지폈나 보다.\n\n그러나 지금은 — 들을 빼앗겨\n봄조차 빼앗기겠네.`},
      {title:'내 마음에 비가 내린다', author:'폴 베를렌 · 1874', text:`내 마음속에 비가 내린다\n도시에 비가 내리듯.\n이 무딘 슬픔은 무엇인가\n내 가슴을 파고드는.\n\n오, 빗소리여, 지붕 위의 부드러운 노래여!\n권태롭고 슬픈 마음에게\n오, 빗소리여.\n\n이유도 없이 눈물이 흐른다.\n배신도 없건만 그리운 건 무엇인가.\n그것이 더욱 깊은 고통 — 이유조차 모르는.`},
      {title:'먼 후일', author:'김소월 · 1925', text:`먼 훗날 당신이 찾으시면\n그때에 내 말이 "잊었노라."\n\n당신이 속으로 나무라면\n"무척 그리다가 잊었노라."\n\n그래도 당신이 나무라면\n"믿기지 않아서 잊었노라."\n\n오늘도 어제도 아니 잊고\n먼 훗날 그때에 "잊었노라."`},
      {title:'빗속에서', author:'헨리 워즈워스 롱펠로 · 1842', text:`하루가 춥고 어둡고 황량하다,\n비가 내리고, 바람이 잠잠하다.\n안개가 포도덩굴 위에 스치고\n거리를 따라 흘러내린다.\n\n내 영혼도 춥고 어둡고 황량하다,\n생각이 구름처럼 모여들고\n희망은 빛을 잃는다.\n\n슬픈 마음이여, 조용히 있어라.\n모든 삶에는 비가 내리는 날이 있고,\n어둡고 황량한 날들이 있다.`},
      {title:'사랑의 노래 (부분)', author:'라이너 마리아 릴케 · 1907', text:`어떻게 내 영혼이 당신의 영혼에\n닿을 수 있을까.\n어떻게 내가 당신의 것에\n그리고 당신이 내 것에 닿을 수 있을까.\n\n마치 이슬비가 밤사이에\n알지 못하는 사이\n내려앉듯이,\n당신은 내게 스민다.`},
      {title:'가을 (부분)', author:'라이너 마리아 릴케 · 1902', text:`나뭇잎들이 떨어진다, 멀리서부터 떨어진다,\n마치 하늘의 먼 정원들이 시들어가듯.\n그것들은 부인하는 몸짓으로 떨어진다.\n\n그리고 밤에 무거운 지구가 떨어진다\n별들로부터, 고독 속으로.\n우리 모두 떨어진다. 이 손도 떨어진다.\n\n그러나 한 분이 계신다, 이 모든 떨어짐을\n한없이 부드럽게 두 손으로 받는 분.`}

    poems:[
      {title:'진달래꽃', author:'김소월 · 1922', text:`나 보기가 역겨워\n가실 때에는\n말없이 고이 보내 드리오리다.\n\n영변에 약산\n진달래꽃\n아름 따다 가실 길에 뿌리오리다.\n\n가시는 걸음걸음\n놓인 그 꽃을\n사뿐히 즈려밟고 가시옵소서.\n\n나 보기가 역겨워\n가실 때에는\n죽어도 아니 눈물 흘리오리다.`},
      {title:'로렐라이', author:'하인리히 하이네 · 1824', text:`무엇인지 알 수 없는 것이\n내 마음을 슬프게 한다.\n오래된 이야기 하나가\n내 머릿속을 떠나지 않는다.\n\n차갑고 어두운 저녁빛 속,\n라인강은 고요히 흐르고,\n저녁 햇살은 봉우리 위에서\n황금빛으로 빛난다.\n\n저 높은 바위 위에\n매혹적인 처녀 하나,\n황금 빗으로 머리를 빗으며\n슬픈 노래를 부른다.`},
      {title:'초혼', author:'김소월 · 1925', text:`산산이 부서진 이름이여!\n허공중에 헤어진 이름이여!\n불러도 주인 없는 이름이여!\n부르다가 내가 죽을 이름이여!\n\n심중에 남아 있는 말 한마디는\n끝끝내 마저 하지 못하였구나.\n\n사랑하던 그 사람이여!\n사랑하던 그 사람이여!\n붉은 해는 서산마루에 걸리었다.\n사슴의 무리도 슬피 운다.\n\n떨어져 나가 앉은 산 위에서\n나는 그대의 이름을 부르노라.`},
      {title:'큰 고통 뒤에', author:'에밀리 디킨슨 · 1862', text:`큰 고통 뒤에 의례적인 감각이 온다 —\n신경들은 묘비처럼 의식을 차리고,\n마음은 자신의 고통이 오래된 것인지\n어제의 것인지를 묻는다.\n\n발은 기계적으로 걷는다,\n땅이든 공기든 굳은 것이든.\n마치 납처럼, 마치 눈처럼.\n\n먼저 — 추위 — 그 다음 무감각 — 그 다음 내려놓음.\n살아남았다면.`},
      {title:'자화상', author:'윤동주 · 1939', text:`산모퉁이를 돌아 논가 외딴 우물을\n홀로 찾아가선 가만히 들여다봅니다.\n\n우물 속에는 달이 밝고 구름이 흐르고\n하늘이 펼치고 파아란 바람이 불고\n가을이 있고 추억처럼 사나이가 있습니다.\n\n어쩐지 그 사나이가 미워져 돌아갑니다.\n\n돌아가다 생각하니 그 사나이가 가엾어집니다.\n도로 가 들여다보니 사나이는 그대로 있습니다.\n\n다시 그 사나이가 미워져 돌아갑니다.\n돌아가다 생각하니 그 사나이가 그리워집니다.\n\n우물 속에는 달이 밝고 구름이 흐르고\n하늘이 펼치고 파아란 바람이 불고\n가을이 있고 추억처럼 사나이가 있습니다.`},
      {title:'그대 늙었을 때', author:'W.B. 예이츠 · 1893', text:`그대 늙어 머리 희고 잠에 지쳐\n불가에 조올며 이 시를 꺼내 읽어라.\n눈 앞에 부드러이 깃들던 그 눈빛을,\n그 깊은 그늘과 꿈결 같은 모습을.\n\n얼마나 많은 이가 그대의 즐거운 순간을 사랑하고\n거짓이거나 진실로 아름다움을 사랑했나.\n오직 한 사람만이 그대 안의 순례하는 영혼을 사랑하고\n그대의 변해가는 얼굴을 사랑했으리.`}

    poems:[
      {title:'나와 나타샤와 흰 당나귀', author:'백석 · 1938', text:`가난한 내가\n아름다운 나타샤를 사랑해서\n오늘밤은 푹푹 눈이 나린다\n\n나타샤를 사랑은 하고\n눈은 푹푹 날리고\n나는 혼자 쓸쓸히 앉아 소주를 마신다\n소주를 마시며 생각한다\n나타샤와 나는\n눈이 푹푹 쌓이는 밤 흰 당나귀 타고\n산골로 가자 출출이 우는 깊은 산골로 가 마가리에 살자`},
      {title:'눈 내리는 저녁 숲 가에서', author:'로버트 프로스트 · 1923', text:`이 숲이 누구의 것인지 나는 안다.\n그의 집은 마을 안에 있다.\n나무들 사이 내리는 눈을\n그는 볼 수 없을 것이다.\n\n내 작은 말은 이상하게 여기리라,\n농가 하나 없는 곳에서 멈추다니.\n숲과 얼어붙은 호수 사이에서\n어두운 저녁이 내려앉는다.\n\n숲은 어둡고 깊고 아름답다.\n하지만 지켜야 할 약속들이 있고,\n잠들기 전에 갈 길이 멀다,\n잠들기 전에 갈 길이 멀다.`},
      {title:'눈', author:'김수영 · 1956', text:`눈은 살아있다\n떨어진 눈은 살아있다\n마당 위에 떨어진 눈은 살아있다\n\n기침을 하자\n젊은 시인이여 기침을 하자\n눈 위에 대고 기침을 하자\n눈더러 보라고 마음 놓고 마음 놓고\n기침을 하자`},
      {title:'떨어져라, 나뭇잎들아', author:'에밀리 브론테 · 1837', text:`떨어져라, 나뭇잎들아, 떨어져라,\n죽어라, 꽃들아, 멀어져라.\n겨울 바람이 뺨을 스치고,\n눈이 대지를 하얗게 뒤덮는다.\n\n봄보다 더 다정한 겨울,\n가을보다 더 기쁜 눈.\n나는 여름 빛 아래 있을 때보다\n어두운 저녁 눈발이 그립다.`},
      {title:'십자가', author:'윤동주 · 1941', text:`쫓아오던 햇빛인데\n지금 교회당 꼭대기\n십자가에 걸리었습니다.\n\n첨탑(尖塔)이 저렇게도 높은데\n어떻게 올라갈 수 있을까요.\n\n종소리도 들려오지 않는데\n휘파람이나 불며 서성거리다가,\n\n괴로웠던 사나이,\n행복한 예수·그리스도에게처럼\n십자가가 허락된다면\n\n모가지를 드리우고\n꽃처럼 피어나는 피를\n어두워 가는 하늘 밑에\n조용히 흘리겠습니다.`},
      {title:'겨울 하이쿠 세 편', author:'마츠오 바쇼 · 17세기', text:`이 세상은\n이슬 한 방울인가 —\n그렇다, 그렇다.\n\n달도 없이, 꽃도 없이,\n홀로 술을 마시다 —\n이것이 고독인가.\n\n겨울 외로움이여 —\n들판도, 산도,\n눈 속에 잠들다.`}

//  HELPERS
// ══════════════════════════════════════════
let cur = 'clear';
const $ = id => document.getElementById(id);

function getCondition(c){
  if(c<=1)return 'clear';if(c===2)return 'partlyCloudy';if(c===3)return 'cloudy';
  if(c===45||c===48)return 'foggy';if(c>=51&&c<=57)return 'drizzle';
  if([61,63,65,80,81,82].includes(c))return 'rainy';
  if([71,73,75,85,86,77].includes(c))return 'snowy';if(c>=95)return 'thunderstorm';
  return 'partlyCloudy';
}

function getGreeting(){
  const h=new Date().getHours();
  if(h<6)return '새벽에도 빛나는 하루';if(h<12)return '좋은 아침입니다 ☀️';
  if(h<14)return '맛있는 점심 드셨나요? 😊';if(h<18)return '좋은 오후입니다 🌤';
  if(h<21)return '좋은 저녁입니다 🌙';return '오늘도 수고하셨습니다 ✨';
}

function updateClock(){
  const n=new Date();
  const days=['일','월','화','수','목','금','토'];
  $('today-date').textContent=`${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${days[n.getDay()]}요일`;
  $('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  $('greeting').textContent=getGreeting();
}

// ══════════════════════════════════════════
//  FETCH
// ══════════════════════════════════════════
async function fetchWeather(lat,lon){
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto&wind_speed_unit=kmh`);
  return (await r.json()).current;
}
async function reverseGeo(lat,lon){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=ko`);const j=await r.json();return j.address?.city||j.address?.county||j.address?.state||'현재 위치';}
  catch{return '현재 위치';}
}

// ══════════════════════════════════════════
//  ENTRY POINTS
// ══════════════════════════════════════════
function getGeo(){
  if(!navigator.geolocation){showErr('위치 서비스를 지원하지 않는 브라우저입니다.');return;}
  showLoading();
  navigator.geolocation.getCurrentPosition(
    async p=>{const city=await reverseGeo(p.coords.latitude,p.coords.longitude);await load(p.coords.latitude,p.coords.longitude,city);},
    ()=>load(37.5665,126.9780,'서울')
  );
}
async function searchCity(){
  const city=$('city-input').value.trim();if(!city)return;showLoading();
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ko&format=json`);
    const j=await r.json();if(!j.results?.length)throw new Error('도시를 찾을 수 없습니다.');
    const{latitude,longitude,name}=j.results[0];await load(latitude,longitude,name);
  }catch(e){showErr(e.message);}
}
async function load(lat,lon,city){
  try{
    showLoading();const w=await fetchWeather(lat,lon);cur=getCondition(w.weather_code);
    renderWeather(w,city);renderAll();
  }catch(e){showErr('날씨를 불러오지 못했습니다: '+e.message);}
}

function renderWeather(w,city){
  const d=DB[cur];document.body.className=d.cls;
  $('loading').style.display='none';$('err-box').style.display='none';
  $('w-emoji').textContent=d.emoji;$('w-loc').textContent='📍 '+city;
  $('w-temp').textContent=Math.round(w.temperature_2m)+'°C';
  $('w-cond').textContent=d.name;
  $('w-hum').textContent='💧 '+w.relative_humidity_2m+'%';
  $('w-wind').textContent='💨 '+Math.round(w.wind_speed_10m)+'km/h';
  $('w-banner').style.display='flex';
}

function renderAll(){
  const d = DB[cur];
  const isFirst = new Date().getDate() === 1;

  const music = pick(d.musics);
  const poem  = pick(d.poems);
  const art   = pick(d.arts);

  // Quote
  $('q-text').textContent = quote.t;
  $('q-src').textContent  = (quote.s && !quote.s.includes('익명')) ? quote.s : '';
  $('quote-box').style.display   = 'block';
  $('quote-box').style.background = 'var(--P)';

  // Tab bar
  $('tab-bar').style.display = 'flex';

  // Music
  $('panel-music').innerHTML = `
    <div class="music-artist">${music.artist}</div>

    <a class="yt-cover" href="https://www.youtube.com/watch?v=${music.yt}" target="_blank" rel="noopener">
      <img src="https://img.youtube.com/vi/${music.yt}/hqdefault.jpg"
           onerror="musicErr(this,'${music.yt}')"

  // Poem

  // Art
  $('panel-art').innerHTML = `<img class="art-img" src="${art.img}" alt="${art.title}" onerror="artErr(this)" style="min-height:60px;background:rgba(0,0,0,.05)"><div class="art-title">${art.title}</div><div class="art-info">${art.info}</div><div class="art-desc">${art.desc}</div>`;

  // Places
  $('panel-places').innerHTML = `<div class="place-grid">${d.places.map(p=>`<a class="place-item" href="https://www.google.com/maps/search/${encodeURIComponent(p.n.split('·')[0].trim())}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;"><div class="place-icon">${p.i}</div><div class="place-name">${p.n} <span style="font-size:.7rem;opacity:.5">↗</span></div><div class="place-desc">${p.d}</div></a>`).join('')}</div>`;

  // Books
  $('panel-books').innerHTML = d.books.map(b=>`<div class="book-item"><div class="book-title">📖 ${b.t}</div><div class="book-author">${b.a}</div><div class="book-reason">${b.r}</div></div>`).join('');

  // Activities
  $('panel-act').innerHTML = `
    <select class="job-sel" id="job-sel" onchange="renderAct()">
      <option value="student">🎓 학생</option>
      <option value="office">💻 직장인</option>
      <option value="home">🏠 주부·부모</option>
      <option value="retired">🌿 은퇴자·시니어</option>
      <option value="freelance">🖥️ 프리랜서·재택근무</option>
      <option value="artist">🎨 크리에이터·예술가</option>
    </select>
    <ul id="act-list" class="act-list"></ul>`;
  renderAct();

  // Show first tab
  showTab('music');
}

function loadYT(el, id){
  window.open('https://www.youtube.com/watch?v=' + id, '_blank');
}

function artErr(el) {
  el.onerror = null;
  el.src = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200">' +
    '<rect width="320" height="200" fill="#222"/>' +
    '<text x="160" y="120" font-size="32" text-anchor="middle" fill="#666" font-family="sans-serif">이미지 없음</text>' +
    '</svg>'
  );
}

function musicErr(el, id) {
  if (el.src.indexOf('hqdefault') > -1) {
    el.src = 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg';
  } else {
    el.onerror = null;
    el.src = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180">' +
      '<rect width="320" height="180" fill="#111"/>' +
      '<text x="160" y="110" font-size="80" text-anchor="middle" fill="#444">&#9834;</text>' +
      '</svg>'
    );
  }
}

function renderAct(){
  const job=($('job-sel')||{}).value||'student';
  const acts=DB[cur]?.jobs[job]||[];
  $('act-list').innerHTML=acts.map(a=>`<li>${a}</li>`).join('');
}

function showTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const tabs=['music','poem','art','places','books','act'];
    b.classList.toggle('active',tabs[i]===name);
  });
  ['music','poem','art','places','books','act'].forEach(t=>{
    $('panel-'+t).classList.toggle('active',t===name);
  });
  // art 탭 열릴 때 이미지 로드 (display:none → block 후 src 설정)
}

// ── Loading / Error ───────────────────────
function showLoading(){
  $('loading').style.display='block';$('err-box').style.display='none';
  $('w-banner').style.display='none';$('quote-box').style.display='none';$('tab-bar').style.display='none';
  ['music','poem','art','places','books','act'].forEach(t=>{$('panel-'+t).classList.remove('active');});
}
function showErr(msg){
  $('loading').style.display='none';$('err-box').style.display='block';
  $('err-box').innerHTML=`<p>⚠️ ${msg}</p><button class="err-btn" onclick="load(37.5665,126.9780,'서울')">서울 날씨로 보기</button>`;
}

// ── Init ─────────────────────────────────
updateClock();setInterval(updateClock,30000);
window.addEventListener('load',getGeo);
window.addEventListener('load',()=>{ setTimeout(()=>{ if(typeof toroSay==='function') toroSay('happy_day','start'); },1500); });
</script>
